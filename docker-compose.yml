services:
  postgres:
    image: pgvector/pgvector:pg16
    environment:
      POSTGRES_DB: textpulse
      POSTGRES_USER: textpulse
      POSTGRES_PASSWORD: textpulse
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data

  redis:
    image: redis:7-alpine
    ports:
      - "6379:6379"

  api:
    build:
      context: ./apps/api
    env_file:
      - ./apps/api/.env.example
    environment:
      DATABASE_URL: postgresql+psycopg://textpulse:textpulse@postgres:5432/textpulse
      REDIS_URL: redis://redis:6379/0
      WEB_ORIGIN: http://localhost:3000
    depends_on:
      - postgres
      - redis
    ports:
      - "8000:8000"

  web:
    build:
      context: ./apps/web
    env_file:
      - ./apps/web/.env.example
    environment:
      NEXT_PUBLIC_API_BASE_URL: http://localhost:8000
    depends_on:
      - api
    ports:
      - "3000:3000"

volumes:
  postgres_data:
